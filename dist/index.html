<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover"
    />
    <meta name="theme-color" content="#f8f9fb" />
    <meta
      name="description"
      content="Калькулятор балльно-рейтинговой системы ЮУрГУ — считайте рейтинг, моделируйте баллы и планируйте аттестацию."
    />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <title>BRS Calculator — ЮУрГУ</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <style>
      html,
      body,
      #root {
        min-height: 100vh;
        margin: 0;
      }

      body {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto,
          sans-serif;
        background: #f8f9fb;
        color: #0f1419;
      }

      html[data-theme='dark'],
      html[data-theme='dark'] body {
        background: #0a0a0c;
        color: #f4f4f5;
      }

      #boot-status {
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 24px;
        color: #6b7280;
        font-size: 15px;
      }

      html[data-theme='dark'] #boot-status {
        color: #a1a1aa;
      }

      #boot-error {
        display: none;
        min-height: 100vh;
        padding: 24px;
        box-sizing: border-box;
      }

      #boot-error.visible {
        display: flex;
        align-items: center;
        justify-content: center;
      }

      #boot-error-inner {
        max-width: 320px;
        text-align: center;
      }

      #boot-error-title {
        font-size: 18px;
        font-weight: 600;
        margin: 0 0 12px;
      }

      #boot-error-message {
        font-size: 14px;
        line-height: 1.5;
        color: #6b7280;
        margin: 0 0 20px;
        word-break: break-word;
      }

      html[data-theme='dark'] #boot-error-message {
        color: #a1a1aa;
      }

      #boot-error button {
        min-height: 44px;
        padding: 12px 20px;
        border: none;
        border-radius: 12px;
        background: #2563eb;
        color: #fff;
        font-size: 15px;
        font-weight: 500;
      }
    </style>
    <script>
      ;(function () {
        var bootPhase = true

        function showBootError(message) {
          var status = document.getElementById('boot-status')
          var error = document.getElementById('boot-error')
          var messageEl = document.getElementById('boot-error-message')
          if (status) status.style.display = 'none'
          if (messageEl) messageEl.textContent = message || 'Неизвестная ошибка'
          if (error) {
            error.className = 'visible'
            error.setAttribute('aria-hidden', 'false')
          }

          try {
            if (
              window.Telegram &&
              window.Telegram.WebApp &&
              window.Telegram.WebApp.showAlert
            ) {
              window.Telegram.WebApp.showAlert(
                String(message || 'Ошибка загрузки'),
              )
            }
          } catch (e) {}
        }

        window.__brsShowBootError = showBootError
        window.__brsAppMounted = false
        window.__brsFinishBoot = function () {
          bootPhase = false
        }

        window.addEventListener(
          'error',
          function (event) {
            if (!bootPhase && window.__brsAppMounted) return
            var message =
              (event.error && event.error.message) ||
              event.message ||
              'Ошибка загрузки'
            if (event.filename && message.indexOf('Script error') !== -1) {
              message = 'Ошибка скрипта: ' + event.filename
            }
            showBootError(message)
          },
          true,
        )

        window.addEventListener('unhandledrejection', function (event) {
          if (!bootPhase && window.__brsAppMounted) return
          var reason = event.reason
          var message =
            reason && reason.message
              ? reason.message
              : String(reason || 'Ошибка загрузки')
          showBootError(message)
        })

        try {
          if (window.Telegram && window.Telegram.WebApp) {
            var scheme = window.Telegram.WebApp.colorScheme
            if (scheme === 'dark' || scheme === 'light') {
              document.documentElement.dataset.theme = scheme
            }
          }
        } catch (e) {}

        setTimeout(function () {
          if (!window.__brsAppMounted) {
            showBootError(
              'Приложение не запустилось за 15 сек. Проверьте интернет и обновите Telegram.',
            )
          }
        }, 15000)
      })()
    </script>
              <link rel="stylesheet" href="/assets/app-CiYjLzDk.css">
  </head>
  <body>
    <div id="root">
      <div id="boot-status">Загрузка…</div>
    </div>
    <div id="boot-error" aria-hidden="true">
      <div id="boot-error-inner">
        <p id="boot-error-title">Не удалось загрузить приложение</p>
        <p id="boot-error-message"></p>
        <button type="button" onclick="location.reload()">Обновить</button>
      </div>
    </div>
    <script src="/telegram-web-app.js" onerror="void 0"></script>
      <script src="/assets/app-BIFEbHl0.js" onerror="window.__brsShowBootError && window.__brsShowBootError('Не удалось загрузить ' + this.src)"></script>
  </body>
</html>
